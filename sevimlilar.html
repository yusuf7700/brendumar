<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sevimlilar | Umar Brend</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body data-page="sevimlilar">

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="container">

            <a href="index.html" class="logo">
                <img src="assets/logo/logo.png" alt="Umar Brend">
            </a>

            <nav class="navbar">
                <a href="index.html">Bosh sahifa</a>
                <a href="#">Erkaklar</a>
                <a href="#">Ayollar</a>
            </nav>

            <div class="header-icons">

                <button class="icon-btn" id="searchBtn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

                <a class="icon-btn" href="sevimlilar.html" style="position:relative;">
                    <i class="fa-solid fa-heart"></i>
                    <span class="count-badge" id="favCount">0</span>
                </a>

                <button class="icon-btn" id="cartBtn" style="position:relative;">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="count-badge" id="cartCount">0</span>
                </button>

                <button class="icon-btn" id="themeBtn">
                    <i class="fa-solid fa-moon"></i>
                </button>

            </div>

        </div>

    </header>

    <!-- ================= FAVORITES ================= -->

    <section class="products" style="padding-top:170px;">

        <div class="container">

            <div class="section-title">
                <h2>❤️ Sevimlilar</h2>
                <p>Siz yoqtirgan mahsulotlar</p>
            </div>

            <div class="product-grid" id="favProductsGrid"></div>

            <div id="favEmptyState"></div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer class="footer">

        <div class="container">

            <img src="assets/logo/logo.png" alt="Umar Brend">

            <p>© 2026 Umar Brend. Barcha huquqlar himoyalangan.</p>

            <div class="footer-links">
                <a href="tel:+998901234567"><i class="fa-solid fa-phone"></i> +998 90 123 45 67</a>
                <a href="https://t.me/umarbrend" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram</a>
                <a href="https://instagram.com/umarbrend" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
            </div>

        </div>

    </footer>

    <!-- SEARCH MODAL -->

    <div class="search-modal" id="searchModal">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Mahsulot qidirish...">
            <button id="closeSearch"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>

        function renderEmptyFavState() {

            const grid = document.getElementById("favProductsGrid");
            const empty = document.getElementById("favEmptyState");

            if (!grid.children.length) {

                empty.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-heart"></i>
                        <h3>Hozircha sevimli mahsulot yo'q</h3>
                        <p><a href="index.html" style="color:var(--gold);font-weight:600;">Mahsulotlarni ko'rish</a></p>
                    </div>
                `;

            } else {

                empty.innerHTML = "";

            }

        }

        (function () {

            const favIds = JSON.parse(localStorage.getItem("favorites")) || [];
            const list = products.filter(p => favIds.includes(p.id));

            renderProducts("favProductsGrid", list);
            renderEmptyFavState();

        })();

    </script>

</body>

</html>
